name = "motaxi-api"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]
account_id = "b85347650ec6de9ad5b2873c3389d0e6"

# Configuración de dominio personalizado
# El custom domain se debe configurar después del despliegue
# usando el dashboard de Cloudflare Workers

# Variables de entorno
[vars]
JWT_SECRET = "your-super-secret-jwt-key-change-this-in-production"
# CORS_ORIGIN permite requests desde el dominio principal
# En desarrollo permite localhost, en producción usa motaxi.dev
CORS_ORIGIN = "https://motaxi.dev,https://www.motaxi.dev,http://localhost:3000"
# RESEND_API_KEY y RESEND_FROM_EMAIL se configuran en .dev.vars para desarrollo
# y como secrets en producción con: wrangler secret put RESEND_API_KEY
# URL pública del sitio Next.js (para callbacks de ePayco)
SITE_URL = "https://motaxi.dev"
# ePayco - llave pública (no es secreta, es pública por diseño de ePayco)
EPAYCO_PUBLIC_KEY = "101df072a3893ba3a275792688bbd7b1"
EPAYCO_TEST_MODE = "false"
# VAPID keys para Web Push Notifications
VAPID_PUBLIC_KEY = "BHJV_6ebHmDfg30ECb_VMCHT_e78Y_FeYxNhwFmitLwbjKqHI52v5KszEDywHvZ-bZJsXJCH8XjPPJXH6zIHmOY"
VAPID_PRIVATE_KEY = "8rM6Ee9ZWZpgui6mZNERt82SPoxcATV0EI3z6-kyI5k"

# Configuración de D1 Database
# Usa la misma base de datos para desarrollo y producción
[[d1_databases]]
binding = "DB"
database_name = "motaxi-db"
database_id = "459371b9-0ba7-4864-9369-51ab7e461c08"

[dev]
remote = true

# Configuración de R2 para almacenamiento de imágenes (opcional - para futuro uso)
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "motaxi-images"
preview_bucket_name = "motaxi-images-preview"

# KV para caché (opcional - para futuro uso)
[[kv_namespaces]]
binding = "CACHE"
id = "1e9a1c3ce899496fa17cc038a8d43756"
preview_id = "84bb680fe29f4ad9b3ab65d60124a6b5"

# Durable Objects para WebSockets en tiempo real (opcional)
# [[durable_objects.bindings]]
# name = "TRIPS"
